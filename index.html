<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小灰灰导航主页</title>
    <meta name="keywords" content="网页UI,简约个人主页,个人主页,导航">
    <meta name="description" content="简约平滑全开源的个人主页">
    <meta name="author" content="小灰QQ2123233252">
    <link rel="shortcut icon" href="https://www.xfwl.club/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/font.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <script src="./assets/js/jQuery3.5.1.js"></script>
</head>

<body>
    <!-- 头部 -->
    <header class="core hd">
        <!-- 时间 -->
        <h1 class="time_econd"></span></h1>
        <h3><span class="time_moon"></span>&nbsp;&nbsp;<span id="clock"></span>&#128513;</h3>
        <!-- 搜索栏 -->
    </header>
    <!-- 主体 -->
    <section class="core main xf_style">
        <!-- 头像 -->
        <div class="tx">
            <!-- https://t.doruo.cn/1dido8EQE -->
            <img src="https://s21.ax1x.com/2024/06/15/pkdvZnA.png" alt="lg" title="lg">
        </div>
        <!-- 姓名 个签 -->
        <div class="xf_name">
            <h2>小灰</h2>
            <h4 id="xf_txt"></h4>
        </div>
        <!-- 图标 （img里面的是透明图是用来转换超链接） -->
        <div class="xf_ico_link">
            <ul>
                <li><a href="https://www.douyin.com/user/self" target="_blank" rel="noopener noreferrer"><img src="./assets/images/transparent.png"
                            alt="抖音" title="抖音"></a></li>
                <li><a href="https://space.bilibili.com/2087495204?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer"><img src="./assets/images/transparent.png"
                            alt="bilibili" title="bilibili"></a></li>
                <li><a href="https://space.bilibili.com/1420625707?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer"><img src="./assets/images/transparent.png"
                            alt="bilibili2" title="bilibili2"></a></li>            
            </ul>
        </div>
        <!-- 介绍 -->
        <div class="xf_introduce">
            <p id="xf_type"></p>
        </div>
        <!-- 滑动效果 -->
        <p class="xf_slide">&#xeb6d;</p>

    </section>
    <!-- 底部 -->
    <footer class="core copy">
        <p>Copyright © 2024 <a href="" target="_blank" rel="noopener noreferrer">小灰</a> 版权所有</p>
    </footer>
    <script type="text/javascript">
        $(document).ready(function () {
            $(".xf_slide").click(function () {
                $(".xf_website").slideToggle("slow");
            })
        })
    </script>
    <script src="./assets/js/time.js"></script>
    <script src="./assets/js/text.js"></script>
    <script src="./assets/js/fireworks.js"></script>
</body>

</html>
